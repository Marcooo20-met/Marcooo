name: Daily Forecast

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run self-test
        run: |
          python weather_ensemble_dago.py --mode self-test --timezone Asia/Jakarta

      - name: Run daily forecast
        run: |
          python weather_ensemble_dago.py --mode forecast --timezone Asia/Jakarta --no-debug

      - name: Upload forecast artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-forecast-output
          path: outputs/
          if-no-files-found: warn
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: outputs
          publish_branch: gh-pages
