name: Daily Forecast

on:
  workflow_dispatch:
  schedule:
    - cron: "15 16 * * *"

permissions:
  contents: read

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run self-test
        run: |
          python weather_ensemble_dago.py --mode self-test --timezone Asia/Jakarta

      - name: Run daily forecast
        run: |
          python weather_ensemble_dago.py --mode forecast --timezone Asia/Jakarta --no-debug

      - name: Build workflow summary
        shell: bash
        run: |
          {
            echo "## Daily Forecast"
            echo ""
            if [ -f run_summary.json ]; then
              echo '```json'
              cat run_summary.json
              echo '```'
            else
              echo "run_summary.json not found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload forecast artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-forecast-output
          path: |
            bmkg_dago*.csv
            canva_dago*.csv
            ensemble_dago*.csv
            forecast_dago*.csv
            run_summary*.json
            source_status_dago*.csv
            source_health.json
            source_weights.json
            logs/
            raw_payloads/
          if-no-files-found: warn
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          publish_branch: gh-pages
